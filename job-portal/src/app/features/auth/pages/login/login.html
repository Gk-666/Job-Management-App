<div class="min-h-screen bg-gray-100 py-10">
  <form
    [formGroup]="loginForm"
    class="max-w-sm mx-auto bg-white mt-18 rounded-xl shadow-lg p-8 font-medium text-gray-700 flex flex-col space-y-4"
  >
    <h2 class="text-2xl border-b pb-2">Welcome back !</h2>
    <div class="flex flex-col gap-2 w-full">
      <label for="email">Email : </label>
      <input
        formControlName="email"
        class="border focus:outline-purple-300 border-gray-400 rounded-lg p-2"
        type="email"
        id="email"
        autocomplete="off"
      />
      <label for="password">Password : </label>
      <input
        formControlName="password"
        class="border focus:outline-purple-300 border-gray-400 rounded-lg p-2"
        type="password"
        id="email"
        autocomplete="off"
      />
    </div>
    <button
      type="submit"
      class="text-white bg-purple-500 rounded-lg p-2 focus:ring-3 focus:ring-purple-400"
      (click)="onSubmit()"
    >
      login
    </button>
  </form>
</div>
