<div class="flex flex-col w-4xl">
  <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
  <div class="bg-white shadow rounded-xl p-6">
    <p class="text-gray-500">Total Jobs</p>

    <h2 class="text-3xl font-bold mt-2">
      {{ stats()?.totalJobs }}
    </h2>
  </div>

  <div class="bg-white shadow rounded-xl p-6">
    <p class="text-gray-500">Open Jobs</p>

    <h2 class="text-3xl font-bold mt-2">
      {{ openJobs }}
    </h2>
  </div>

  <div class="bg-white shadow rounded-xl p-6">
    <p class="text-gray-500">Closed Jobs</p>

    <h2 class="text-3xl font-bold mt-2">
      {{ closedJobs }}
    </h2>
  </div>

  <div class="bg-white shadow rounded-xl p-6">
    <p class="text-gray-500">Total Applications</p>

    <h2 class="text-3xl font-bold mt-2">
      {{ stats()?.totalApplications }}
    </h2>
  </div>
</div>
<div class="grid md:grid-cols-2 gap-6 mt-8">
  <div class="bg-white rounded-2xl shadow-md p-6 hover:shadow-xl transition">
    <h2 class="text-lg font-semibold mb-4">Application Status</h2>

    <canvas baseChart [data]="pieChartData" [type]="pieChartType" [options]="pieChartOptions">
    </canvas>
  </div>
  <div class="bg-white rounded-2xl shadow-md p-6 hover:shadow-xl transition">
    <h2 class="text-lg font-semibold mb-4">Top Skills</h2>

    <canvas class="mt-25" baseChart [data]="barChartData" [type]="barChartType" [options]="barChartOptions">
    </canvas>
  </div>
</div>

<section class="bg-white rounded-xl shadow p-6 mt-8">
  <h2 class="text-xl font-semibold mb-4">Recent Jobs</h2>

  <div class="space-y-3">
    @for (job of stats()?.recentJobs; track job) {
      <div class="flex justify-between items-center border-b pb-2">
        <div>
          <p class="font-medium">
            {{ job.title }}
          </p>

          <p class="text-sm text-gray-500">
            {{ job.company }}
          </p>
        </div>

        <span>
          {{ job.status }}
        </span>
      </div>
    }
  </div>
</section>

</div>
