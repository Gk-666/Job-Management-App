<div class="max-w-6xl mx-auto space-y-8">
  <!-- Header -->
  <div
    class="rounded-3xl bg-gradient-to-r from-purple-700 via-violet-700 to-indigo-700 p-8 shadow-xl"
  >
    <h1 class="text-4xl font-bold text-white">Create New Job</h1>

    <p class="text-purple-100 mt-2">Fill in the details below to publish a new job opportunity.</p>
  </div>

  <form [formGroup]="jobForm" class="space-y-8" (ngSubmit)="onSubmit()">
    <!-- Job Information -->
    <section class="bg-slate-900 border border-slate-800 rounded-3xl p-8">
      <h2 class="text-xl text-white font-semibold mb-6">Job Information</h2>

      <div class="grid md:grid-cols-2 gap-6">
        <div class="flex flex-col space-y-2">
          <label class="text-slate-400">Job Title</label>

          <input
            formControlName="title"
            type="text"
            class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white outline-none focus:border-purple-500"
          />
        </div>

        <div class="flex flex-col space-y-2">
          <label class="text-slate-400">Company Name</label>

          <input
            formControlName="companyName"
            type="text"
            class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white outline-none focus:border-purple-500"
          />
        </div>

        <div class="flex flex-col space-y-2">
          <label class="text-slate-400">Location</label>

          <input
            formControlName="location"
            type="text"
            class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white outline-none focus:border-purple-500"
          />
        </div>

        <div class="flex flex-col space-y-2">
          <label class="text-slate-400">Salary Range</label>

          <input
            formControlName="salaryRange"
            type="text"
            placeholder="e.g ₹6 LPA - ₹10 LPA"
            class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white outline-none focus:border-purple-500"
          />
        </div>
      </div>
    </section>

    <!-- Requirements -->

    <section class="bg-slate-900 border border-slate-800 rounded-3xl p-8">
      <h2 class="text-xl text-white font-semibold mb-6">Requirements</h2>

      <div class="grid md:grid-cols-2 gap-6">
        <div class="flex flex-col space-y-2">
          <label class="text-slate-400"> Employment Type </label>

          <select
            formControlName="employmentType"
            class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white"
          >
            <option value="Full-Time">Full-Time</option>
            <option value="Part-Time">Part-Time</option>
            <option value="Internship">Internship</option>
            <option value="Contract">Contract</option>
          </select>
        </div>

        <div class="flex flex-col space-y-2">
          <label class="text-slate-400"> Experience Level </label>

          <select
            formControlName="experienceLevel"
            class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white"
          >
            <option value="Fresher">Fresher</option>
            <option value="1-2 Years">1-2 Years</option>
            <option value="3-5 Years">3-5 Years</option>
            <option value="5+ Years">5+ Years</option>
          </select>
        </div>
      </div>

      <!-- Skills -->

      <div class="mt-8">
        <label class="text-slate-400 mb-4 block"> Required Skills </label>

        <div formArrayName="skillsRequired" class="grid md:grid-cols-3 gap-3">
          @for (skill of skills.controls; track skill) {
            <div
              class="flex items-center gap-2 bg-slate-800 rounded-xl p-3 border border-slate-700"
            >
              <input
                [formControlName]="$index"
                class="flex-1 bg-transparent text-white outline-none"
              />

              <button type="button" (click)="removeSkill($index)" class="text-red-400 textxl font-semibold">
                ×
              </button>
            </div>
          }

          <button
            type="button"
            (click)="addSkill()"
            class="rounded-xl border-2 border-dashed border-purple-500 text-purple-400 hover:bg-purple-500/10 p-3"
          >
            + Add Skill
          </button>
        </div>
      </div>
    </section>

    <!-- Description -->

    <section class="bg-slate-900 border border-slate-800 rounded-3xl p-8">
      <h2 class="text-xl text-white font-semibold mb-6">Job Description</h2>

      <textarea
        rows="8"
        formControlName="description"
        placeholder="Describe responsibilities, expectations, benefits..."
        class="w-full bg-slate-800 border border-slate-700 rounded-xl p-4 text-white outline-none resize-none focus:border-purple-500"
      ></textarea>
    </section>

    <!-- Publish -->

    <section class="bg-slate-900 border border-slate-800 rounded-3xl p-8">
      <div class="flex items-center justify-between">
        <div>
          <h3 class="text-white font-semibold text-lg">Publish Job</h3>

          <p class="text-slate-400 text-sm mt-1">
            The job will become visible to applicants immediately.
          </p>
        </div>

        <button
          type="submit"
          class="px-8 py-4 rounded-2xl bg-gradient-to-r from-purple-600 to-violet-600 text-white font-semibold shadow-lg hover:scale-105 transition"
        >
          Publish Job
        </button>
      </div>
    </section>
  </form>
</div>
