<aside
  class="w-68 min-h-screen sticky left-0 bg-slate-900/70 backdrop-blur-xl border-r border-slate-800 flex flex-col font-semibold"
>
  <!-- Logo -->

  <div class="px-6 py-8 border-b border-slate-800">
    <h1
      class="text-2xl font-bold bg-gradient-to-r from-purple-400 to-indigo-400 bg-clip-text text-transparent"
    >
      Job Portal
    </h1>

    <p class="text-slate-500 text-sm mt-1">Admin Workspace</p>
  </div>

  <!-- Navigation -->

  <nav class="flex-1 p-4 space-y-2">
    <a
      routerLink="/admin/dashboard"
      routerLinkActive="bg-purple-500/20 text-purple-300"
      class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-slate-800 transition"
    >
      📊 Dashboard
    </a>

    <a
      routerLink="/admin/jobs"
      routerLinkActive="bg-purple-500/20 text-purple-300"
      class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-slate-800 transition"
    >
      💼 Manage Jobs
    </a>

    <a
      routerLink="/admin/jobs/create"
      routerLinkActive="bg-purple-500/20 text-purple-300"
      class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-slate-800 transition"
    >
      ✨ Create Job
    </a>
  </nav>

  <!-- Footer -->

  <div class="p-4 border-t border-slate-800">
    <button
      class="w-full rounded-xl bg-red-500/10 text-red-300 py-3 hover:bg-red-500/20 transition"
      (click)="logout()"
    >
      Logout
    </button>
  </div>
</aside>
