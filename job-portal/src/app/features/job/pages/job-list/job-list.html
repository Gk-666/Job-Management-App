<div class="min-h-screen bg-gray-100 py-10 rounded-lg">
  <div class="max-w-6xl mx-auto px-8">
    <div class="mb-8 flex justify-between items-center">
      <h1 class="text-3xl font-bold text-left text-slate-700">Available Jobs</h1>
      <input
        type="search"
        placeholder="Search jobs..."
        class="w-78 border border-gray-300 rounded-lg p-3 outline-none focus:ring-2 focus:ring-purple-400"
      />
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      @for (job of jobs(); track job._id) {
        <div
          class="bg-white rounded-xl shadow-md border border-gray-200 p-6 hover:shadow-lg transition"
        >
          <h2 class="text-xl font-semibold mb-2">
            {{ job.title }}
          </h2>

          <p class="text-gray-600 mb-3">
            {{ job.company }}
          </p>

          <div class="space-y-2 text-sm text-gray-700">
            <p>📍 {{ job.location }}</p>

            <p>💰 ₹{{ job.salary }}</p>

            <p>🕒 Posted on : {{ job.createdAt | date: 'mediumDate' }}</p>
          </div>

          <button
            class="mt-5 w-full bg-purple-600 text-white py-2 rounded-lg hover:bg-purple-700 transition"
            [routerLink]="['/home/jobs', job._id]"
          >
            View Details
          </button>
        </div>
      }
    </div>
  </div>
</div>
