<div class="min-h-screen bg-gray-100 py-10">
  <div class="max-w-4xl mx-auto px-4">
    <div class="bg-white rounded-xl shadow-lg p-8">
      <div class="border-b pb-4 mb-6">
        <h1 class="text-3xl font-bold">
          {{ job()?.title }}
        </h1>

        <p class="text-gray-600 mt-2">
          {{ job()?.company }}
        </p>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
        <div class="bg-gray-50 rounded-lg p-4">
          <p class="text-sm text-gray-500">Location</p>
          <p class="font-semibold">{{ job()?.location }}</p>
        </div>

        <div class="bg-gray-50 rounded-lg p-4">
          <p class="text-sm text-gray-500">Salary</p>
          <p class="font-semibold">₹{{ job()?.salary }}</p>
        </div>

        <div class="bg-gray-50 rounded-lg p-4">
          <p class="text-sm text-gray-500">Job status</p>
          <p
            class="font-semibold px-3 py-1 rounded-full w-fit mt-1"
            [class.bg-red-100]="job()?.status === 'Close'"
            [class.text-red-700]="job()?.status === 'Close'"
            [class.bg-green-100]="job()?.status === 'Open'"
            [class.text-green-700]="job()?.status === 'Open'"
          >
            {{ job()?.status }}
          </p>
        </div>
      </div>

      <div class="mb-8">
        <h2 class="text-xl font-semibold mb-3">Job Description</h2>

        <p class="text-gray-700 leading-relaxed">
          {{ job()?.description }}
        </p>
      </div>

      <div class="mb-8">
        <h2 class="text-xl font-semibold mb-3">Required Skills</h2>

        <div class="flex flex-wrap gap-2">
          @for (skill of job()?.skillsRequired; track skill) {
            <span class="bg-purple-100 text-purple-700 px-3 py-1 rounded-full text-sm">
              {{ skill }}
            </span>
          }
        </div>
      </div>

      <button
        class="w-full bg-purple-600 text-white py-3 rounded-lg hover:bg-purple-700 transition font-semibold"
        [routerLink]="['/home/jobs', job()?._id, 'apply']"
        [hidden]="job()?.status === 'Close'"
      >
        Apply Now
      </button>
    </div>
  </div>
</div>
