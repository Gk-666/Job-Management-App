<div class="min-h-screen bg-gray-100 py-10">
  <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-lg p-8">
    <form [formGroup]="applicationForm" class="flex flex-col space-y-3">
      <h2 class="text-xl font-bold border-b pb-2">Personal info</h2>
      <section
        formGroupName="personalInfo"
        class="personalInfo grid grid-cols-1 md:grid-cols-2 gap-4 space-y-3"
      >
        <div class="flex items-center gap-2">
          <label for="firstName">First Name : </label>
          <input
            readonly
            class="bg-gray-100 border rounded-lg p-2 text-gray-600 cursor-not-allowed"
            type="text"
            id="firstName"
            formControlName="firstName"
          />
        </div>
        <div class="flex items-center gap-2">
          <label for="lastName">Last Name : </label>
          <input
            readonly
            class="bg-gray-100 border rounded-lg p-2 text-gray-600 cursor-not-allowed"
            type="text"
            id="lastName"
            formControlName="lastName"
          />
        </div>
        <div class="flex items-center gap-2">
          <label for="mobileNumber">Mobile No : </label>
          <input
            class="border p-1 rounded-lg p-2"
            type="text"
            id="mobileNumber"
            formControlName="mobileNumber"
          />
        </div>
        <div class="flex items-center gap-2">
          <label for="email">Email : </label>
          <input class="border p-1 rounded-lg p-2" type="text" id="email" formControlName="email" />
        </div>
        <div class="flex gap-6 items-center">
          <label for="gender">Gender : </label>
          <label class="flex gap-2" for="male"
            >Male
            <input
              type="radio"
              name="gender"
              id="male"
              value="male"
              formControlName="gender"
              class="mt-1"
          /></label>
          <label class="flex gap-2" for="female"
            >Female
            <input
              type="radio"
              id="female"
              name="gender"
              value="female"
              formControlName="gender"
              class="mt-1"
          /></label>
        </div>

        <div class="flex items-center gap-2">
          <label for="location">Current Location : </label>
          <input
            class="border p-1 rounded-lg p-2"
            type="text"
            id="location"
            formControlName="currentLocation"
          />
        </div>
      </section>
      <h2 class="text-xl font-bold border-b pb-2">Professional info</h2>
      <section formGroupName="professionalInfo" class="professionalInfo gap-4 space-y-3">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="flex items-center gap-2">
            <label for="">Qualification : </label>
            <input class="border rounded-lg p-2" type="text" formControlName="qualification" />
          </div>
          <div class="flex items-center gap-2">
            <label for="">Experience : </label>
            <select name="" id="" class="border rounded-lg p-2" formControlName="experience">
              <option value="fresher">Fresher</option>
              <option value="1">1 yr</option>
              <option value="2">2 yrs</option>
              <option value="3">3 yrs</option>
              <option value="4">4 yrs</option>
              <option value="5">5+ yrs</option>
            </select>
          </div>
        </div>
        <div class="flex gap-2">
          <label>Skills : </label>
          <div formArrayName="skills" class="grid grid-cols-2 gap-2">
            @for (control of skills.controls; track control) {
              <div class="flex gap-2">
                <input class="border rounded-lg p-2" type="text" [formControlName]="$index" />
                @if (skills.length > 1) {
                  <button
                    type="button"
                    class="text-white bg-red-300 rounded font-semibold px-1"
                    (click)="removeSkill($index)"
                  >
                    remove
                  </button>
                }
              </div>
            }
          </div>
          <button
            type="button"
            class="bg-purple-500 p-1 mr-1 text-white rounded font-semibold h-fit"
            (click)="addSkill()"
          >
            + Add skill
          </button>
        </div>
      </section>
      <h2 class="text-xl font-bold border-b pb-2">Prefernces</h2>
      <section
        formGroupName="preferences"
        class="preferences grid grid-cols-1 md:grid-cols-2 gap-4 space-y-3 items-center"
      >
        <label class="flex items-center w-fit gap-2" for="relocation"
          >Willing to relocate ? : yes
          <input type="checkbox" id="relocation" formControlName="relocation" class="h-4 w-4 mt-1"
        /></label>

        <div class="flex gap-4">
          <label for="">Work Type : </label>
          <label class="flex items-center gap-2" for="remote"
            >Remote
            <input
              type="radio"
              name="work"
              id="remote"
              value="remote"
              formControlName="workMode"
              class="mt-1"
          /></label>
          <label for="on-site" class="flex items-center gap-2"
            >On-site
            <input
              type="radio"
              name="work"
              id="on-site"
              value="on-site"
              class="mt-1"
              formControlName="workMode"
          /></label>
          <label for="hybrid" class="flex items-center gap-2"
            >Hybrid
            <input
              type="radio"
              name="work"
              id="hybrid"
              value="hybrid"
              formControlName="workMode"
              class="mt-1"
          /></label>
        </div>
      </section>
    </form>
  </div>
</div>
